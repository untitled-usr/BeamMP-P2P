<div style="height:100%; background-color: rgba(0, 0, 0, 0.50);">
	<div class="offset-div">
		<div id="MultiplayerLoginBody" style="display:flex; height:100%; flex-direction:column; padding-left:150px; align-items: center; justify-content: center;">
			<img src="local://local/ui/modModules/multiplayer/beammp.png" alt="BeamMP Logo">
			<h2 class="text-red" id="LOGINERRORFIELD"></h2>
			<form id="LoginContainer" ng-submit="$event.preventDefault(); confirmUsername();">
				<h2 class="text-white" id="loginHeader">{{:: 'ui.multiplayer.usernamePrompt' | translate}}</h2>
				<input type="text"
					id="mpUsernameInput"
					class="text-white"
					style="width: 320px; max-width: 90vw; padding: 10px; margin: 12px 0; border-radius: 4px; border: 1px solid rgba(255,255,255,0.35); background: rgba(0,0,0,0.4); color: #fff;"
					maxlength="32"
					autocomplete="off"
					placeholder="{{ 'ui.multiplayer.usernamePlaceholder' | translate}}"
					ng-disabled="loginSubmitting"
					(keyup.enter)="confirmUsername()"/>
				<div style="display:flex; align-content: center; justify-content: center;">
					<md-button type="button" class="button md-raised md-primary" ng-disabled="loginSubmitting" ng-click="confirmUsername()">
						{{:: 'ui.multiplayer.confirmEnter' | translate}}
					</md-button>
				</div>
			</form>
		</div>
	</div>
</div>
